<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Chicken</title>
    <link rel="stylesheet" href="cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/download.png" type="image/x-icon">
<body>

    <button class="back-btn" onclick="window.history.back()">
        <img src="https://api.iconify.design/material-symbols:arrow-back-ios-new-rounded.svg?color=%23ffffff" alt="Voltar">
    </button>

    <div class="form-container">
        <img src="img/download.png" alt="Logo" class="logo" width="200px" >

        

        <form>
            <div class="input-group">
                <img src="https://api.iconify.design/material-symbols:person-outline-rounded.svg?color=%23f39c12" class="input-icon" alt="Nome">
                <input type="text" placeholder="Nome completo" required>
            </div>

            <div class="input-group">
                <img src="https://api.iconify.design/material-symbols:mail-outline-rounded.svg?color=%23e67e22" class="input-icon" alt="E-mail">
                <input type="email" placeholder="e-mail" required>
            </div>

            <div class="input-group">
                <img src="img/cadeado.png" class="input-icon" alt="Senha">
                <input type="password" placeholder="Senha" required>
            </div>

            <button type="submit" class="submit-btn">Criar conta</button>
        </form>

        <div class="ou">
            <span>ou</span>
        </div>

        <button class="google-btn">
            <img src="https://api.iconify.design/logos:google-icon.svg" alt="Google">
        </button>
    </div>

</body>
</html>
